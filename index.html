<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 24px 20px 12px;
    background: linear-gradient(180deg, #12121a 0%, #0a0a0f 100%);
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-top: 4px;
  }

  .layout {
    display: flex;
    height: calc(100vh - 80px);
  }

  @media (max-width: 900px) {
    .layout { flex-direction: column; height: auto; }
    #map { height: 50vh !important; min-height: 300px; }
    .timeline { height: auto !important; max-height: 50vh; }
  }

  #map {
    flex: 1;
    min-height: 400px;
    z-index: 1;
  }

  .timeline {
    width: 380px;
    overflow-y: auto;
    padding: 16px;
    background: #0f0f17;
    border-left: 1px solid #1e1e2e;
  }

  @media (max-width: 900px) {
    .timeline { width: 100%; border-left: none; border-top: 1px solid #1e1e2e; }
  }

  .timeline h2 {
    font-size: 14px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e1e2e;
  }

  .trip-card {
    background: #161622;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .trip-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .trip-card.booked::before { background: #22c55e; }
  .trip-card.pending::before { background: #f59e0b; }
  .trip-card.past::before { background: #475569; }

  .trip-card:hover {
    border-color: #334155;
    transform: translateX(2px);
  }

  .trip-card.active {
    border-color: #60a5fa;
    box-shadow: 0 0 20px rgba(96, 165, 250, 0.1);
  }

  .trip-city {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .trip-flag { font-size: 20px; }

  .trip-dates {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .trip-details {
    margin-top: 8px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.6;
    display: none;
  }

  .trip-card.active .trip-details { display: block; }

  .trip-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: auto;
  }

  .badge-booked { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge-pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-past { background: rgba(71,85,105,0.15); color: #64748b; }

  .trip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .legend {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    justify-content: center;
    font-size: 11px;
    color: #64748b;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot-booked { background: #22c55e; }
  .dot-pending { background: #f59e0b; }
  .dot-past { background: #475569; }

  .countdown {
    font-size: 11px;
    color: #a78bfa;
    font-weight: 500;
    margin-top: 2px;
  }

  /* Custom scrollbar */
  .timeline::-webkit-scrollbar { width: 4px; }
  .timeline::-webkit-scrollbar-track { background: #0f0f17; }
  .timeline::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 4px; }

  /* Leaflet popup styling */
  .leaflet-popup-content-wrapper {
    background: #161622 !important;
    color: #e0e0e0 !important;
    border-radius: 10px !important;
    border: 1px solid #1e1e2e !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: #161622 !important; }

  .leaflet-popup-content {
    font-family: 'Inter', sans-serif !important;
    font-size: 13px !important;
    line-height: 1.5 !important;
  }

  .popup-city { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .popup-dates { color: #94a3b8; font-size: 12px; }
  .popup-detail { color: #64748b; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>✈️ Travel Dashboard</h1>
  <div class="subtitle">March — May 2026 · 8 trips · 6 countries</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-past"></div> Past</div>
  <div class="legend-item"><div class="legend-dot dot-booked"></div> Booked</div>
  <div class="legend-item"><div class="legend-dot dot-pending"></div> Pending</div>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="timeline">
    <h2>Upcoming Trips</h2>
    <div id="trip-list"></div>
  </div>
</div>

<script>
const LISBON = [38.7223, -9.1393];

const trips = [
  {
    id: 'ams-bru',
    city: 'Amsterdam + Brussels',
    flag: '🇳🇱🇧🇪',
    coords: [52.3676, 4.9041],
    coordsEnd: [50.8503, 4.3517],
    dates: 'Mar 17 — 19',
    startDate: '2026-03-17',
    endDate: '2026-03-19',
    status: 'booked',
    details: [
      '✈️ Tue 17: TP668 LIS→AMS 08:40 (Seat 16F)',
      '🚆 Train AMS → Brussels',
      '✈️ Thu 19: TP645 BRU→LIS 17:55 (Seat 16F)',
      '💼 Work meetings'
    ]
  },
  {
    id: 'london',
    city: 'London',
    flag: '🇬🇧',
    coords: [51.5074, -0.1278],
    dates: 'Mar 25 — 29',
    startDate: '2026-03-25',
    endDate: '2026-03-29',
    status: 'booked',
    details: [
      '✈️ Wed 25: TP1352 LIS→LHR 09:50',
      '🏦 Thu 26: World Finance Forum',
      '📍 Convene Sancroft, St. Paul\'s (EC4M 7DQ)',
      '🏠 Fri 27-Sun 29: Staying with Anna',
      '✈️ Sun 29: TP1357 LHR→LIS 18:45'
    ]
  },
  {
    id: 'stockholm',
    city: 'Stockholm',
    flag: '🇸🇪',
    coords: [59.3293, 18.0686],
    dates: 'Apr 7 — 9',
    startDate: '2026-04-07',
    endDate: '2026-04-09',
    status: 'booked',
    details: [
      '✈️ Tue 7: TP782 LIS→ARN 12:25–17:45 (TAP)',
      '💼 Wed 8: Work in Stockholm',
      '✈️ Thu 9: D82046 ARN→CDG 09:05–11:45 (Norwegian)',
      '📝 Board meeting in Paris Apr 9'
    ]
  },
  {
    id: 'paris-board',
    city: 'Paris (Board)',
    flag: '🇫🇷',
    coords: [48.8566, 2.3522],
    dates: 'Apr 9 — 10',
    startDate: '2026-04-09',
    endDate: '2026-04-10',
    status: 'booked',
    details: [
      '✈️ Thu 9: D82046 ARN→CDG 09:05–11:45 (Norwegian)',
      '🏦 Thu 9: Board meeting',
      '✈️ Fri 10: AF1624 CDG→LIS 13:15–14:55 (Air France)',
      '🏨 1 night in Paris'
    ]
  },
  {
    id: 'paris-exec',
    city: 'Paris (Exec)',
    flag: '🇫🇷',
    coords: [48.8566, 2.3522],
    dates: 'Apr 21',
    startDate: '2026-04-21',
    endDate: '2026-04-21',
    status: 'pending',
    details: [
      '⏳ Not booked yet',
      '💼 Exec team meeting',
      '📝 Day trip or 1 night TBD'
    ]
  },
  {
    id: 'jerez',
    city: 'Jerez',
    flag: '🇪🇸',
    coords: [36.6850, -6.1261],
    dates: 'Apr 24',
    startDate: '2026-04-24',
    endDate: '2026-04-24',
    status: 'pending',
    details: [
      '⏳ Not booked yet',
      '✈️ Fly from Lisbon (always via LIS)',
      '🇵🇹 Apr 25: Dia da Liberdade (bank holiday)'
    ]
  },
  {
    id: 'oslo',
    city: 'Oslo',
    flag: '🇳🇴',
    coords: [59.9139, 10.7522],
    dates: 'May 16 — 21',
    startDate: '2026-05-16',
    endDate: '2026-05-21',
    status: 'pending',
    details: [
      '⏳ Not booked yet',
      '✈️ Sat 16: Fly in',
      '🎉 Sun 17: Syttende Mai (Norwegian National Day)',
      '💼 Mon-Wed 19-21: Work',
      '✈️ Wed/Thu: Fly back'
    ]
  }
];

// Determine past trips
const today = new Date();
today.setHours(0,0,0,0);
trips.forEach(t => {
  const end = new Date(t.endDate + 'T23:59:59');
  if (end < today) t.status = 'past';
});

// Initialize map
const map = L.map('map', {
  center: [50, 8],
  zoom: 4,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

// Colors
const colors = {
  booked: '#22c55e',
  pending: '#f59e0b',
  past: '#475569'
};

// Draw routes and markers
const markers = {};

trips.forEach(trip => {
  const color = colors[trip.status];
  
  // Route line from Lisbon
  const route = L.polyline([LISBON, trip.coords], {
    color: color,
    weight: 2,
    opacity: trip.status === 'past' ? 0.3 : 0.6,
    dashArray: trip.status === 'pending' ? '8 6' : null
  }).addTo(map);

  // If trip has two cities (AMS+BRU), draw connection
  if (trip.coordsEnd) {
    L.polyline([trip.coords, trip.coordsEnd], {
      color: color,
      weight: 2,
      opacity: trip.status === 'past' ? 0.3 : 0.6,
      dashArray: trip.status === 'pending' ? '8 6' : null
    }).addTo(map);

    // Return line from end city
    L.polyline([trip.coordsEnd, LISBON], {
      color: color,
      weight: 2,
      opacity: trip.status === 'past' ? 0.3 : 0.4,
      dashArray: '4 8'
    }).addTo(map);

    // End city marker
    L.circleMarker(trip.coordsEnd, {
      radius: 5,
      fillColor: color,
      color: color,
      weight: 1,
      opacity: trip.status === 'past' ? 0.4 : 0.8,
      fillOpacity: trip.status === 'past' ? 0.3 : 0.6
    }).addTo(map).bindPopup(`
      <div class="popup-city">${trip.flag} Brussels</div>
      <div class="popup-dates">${trip.dates}</div>
      <div class="popup-detail">Part of Amsterdam + Brussels trip</div>
    `);
  }

  // Stockholm→Paris route
  if (trip.id === 'paris-board') {
    L.polyline([[59.3293, 18.0686], trip.coords], {
      color: color,
      weight: 2,
      opacity: 0.6
    }).addTo(map);
  }

  // Return line from destination to Lisbon (for non-multi-city)
  if (!trip.coordsEnd) {
    L.polyline([trip.coords, LISBON], {
      color: color,
      weight: 2,
      opacity: trip.status === 'past' ? 0.3 : 0.4,
      dashArray: '4 8'
    }).addTo(map);
  }

  // City marker
  const marker = L.circleMarker(trip.coords, {
    radius: trip.status === 'past' ? 5 : 7,
    fillColor: color,
    color: color,
    weight: 2,
    opacity: trip.status === 'past' ? 0.4 : 0.9,
    fillOpacity: trip.status === 'past' ? 0.3 : 0.7
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-city">${trip.flag} ${trip.city}</div>
    <div class="popup-dates">${trip.dates}</div>
    <div class="popup-detail">${trip.details[0]}</div>
  `);

  markers[trip.id] = { marker, route };
});

// Lisbon home marker
L.circleMarker(LISBON, {
  radius: 8,
  fillColor: '#60a5fa',
  color: '#60a5fa',
  weight: 2,
  opacity: 0.9,
  fillOpacity: 0.7
}).addTo(map).bindPopup('<div class="popup-city">🏠 Lisbon</div><div class="popup-dates">Home base</div>');

// Build timeline
const tripList = document.getElementById('trip-list');

function daysUntil(dateStr) {
  const target = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  if (diff < 0) return null;
  if (diff === 0) return 'Today!';
  if (diff === 1) return 'Tomorrow';
  return `In ${diff} days`;
}

trips.forEach(trip => {
  const card = document.createElement('div');
  card.className = `trip-card ${trip.status}`;
  card.dataset.id = trip.id;

  const badgeClass = `badge-${trip.status}`;
  const badgeText = trip.status === 'booked' ? 'Booked' : trip.status === 'pending' ? 'Pending' : 'Past';
  const countdown = trip.status !== 'past' ? daysUntil(trip.startDate) : null;

  card.innerHTML = `
    <div class="trip-header">
      <div>
        <div class="trip-city"><span class="trip-flag">${trip.flag}</span> ${trip.city}</div>
        <div class="trip-dates">${trip.dates}</div>
        ${countdown ? `<div class="countdown">${countdown}</div>` : ''}
      </div>
      <span class="trip-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="trip-details">
      ${trip.details.map(d => `<div>${d}</div>`).join('')}
    </div>
  `;

  card.addEventListener('click', () => {
    // Toggle active
    document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('active'));
    card.classList.toggle('active');
    
    // Pan map
    map.flyTo(trip.coords, 6, { duration: 0.8 });
    markers[trip.id].marker.openPopup();
  });

  tripList.appendChild(card);
});
</script>

</body>
</html>
